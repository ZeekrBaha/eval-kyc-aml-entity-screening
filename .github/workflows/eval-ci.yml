name: eval-ci
on: [push, pull_request]
jobs:
  quality-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install deps
        run: uv sync
      - name: Lint + types
        run: make check
      - name: Unit tests + coverage gate
        run: make cov
      - name: Debrand gate
        run: make debrand
      - name: Offline eval + release gate (no API key)
        env: { KYCEVAL_OFFLINE: "1" }
        run: make eval-offline
